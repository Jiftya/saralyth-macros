<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seralyth Macros</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        blue: { 400: '#a357ff', 500: '#7809f5', 600: '#5b06ba' }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>

    <style>
        body { background-color: #080a0c; color: #ffffff; font-family: 'Inter', ui-sans-serif, sans-serif; -webkit-font-smoothing: antialiased; }
        
        .macro-card, .request-card { 
            background-color: #121519; 
            border: 1px solid #2d3136; 
            transition: transform 0.15s ease-out, border-color 0.15s; 
            border-radius: 14px; 
            will-change: transform; 
        }
        
        .macro-card:hover { border-color: #7809f5; transform: scale(1.01); }

        .modal-blur { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .modal-content { background-color: #0f1216; border-radius: 20px; border: 1px solid #374151; overflow: hidden; }
        
        .code-wrapper { position: relative; border-radius: 10px; background: #050608; border: 1px solid #1f2937; overflow: hidden; }
        pre[class*="language-"] { margin: 0 !important; font-size: 0.85rem; max-height: 400px; overflow: auto; padding: 1.2rem !important; }

        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; background: #000; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        [v-cloak] { display: none; }

        .discord-float { position: fixed; bottom: 2rem; right: 2rem; background-color: #5865F2; width: 55px; height: 55px; border-radius: 14px; display: flex; align-items: center; justify-content: center; z-index: 100; transition: transform 0.2s; }
        .discord-float:hover { transform: translateY(-5px); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-12 min-h-screen">

    <div id="app" class="max-w-5xl mx-auto" v-cloak>
        <a href="https://discord.gg/sb4EhhtMvk" target="_blank" class="discord-float"><svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.666 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.29a.074.074 0 0 1 .077-.01c3.927 1.793 8.18 1.793 12.061 0a.074.074 0 0 1 .077.01c.12.098.246.196.373.29a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.874.89.076.076 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.182 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg></a>
        
        <header class="mb-8">
            <h1 class="text-4xl font-black italic tracking-tighter">Seralyth <span class="text-blue-500">Macros</span></h1>
            <div class="mt-6 flex flex-col md:flex-row gap-3">
                <input v-model="searchQuery" type="text" placeholder="Search..." class="flex-grow bg-[#121519] border border-[#2d3136] rounded-xl py-4 px-6 focus:outline-none focus:border-blue-500">
                <select v-model="searchType" class="bg-[#121519] border border-[#2d3136] rounded-xl px-4 py-4 md:py-0 focus:outline-none">
                    <option value="title">Name</option>
                    <option value="author">Profile</option>
                </select>
            </div>
        </header>

        <div v-if="isLoading" class="text-blue-500 font-bold animate-pulse text-center py-10">Loading...</div>
        <div v-else class="grid grid-cols-1 gap-3">
            <div v-for="post in filteredPosts" :key="post.fileUrl" @click="openModal(post)" class="macro-card p-5 flex justify-between items-center cursor-pointer">
                <div class="flex items-center gap-4 overflow-hidden">
                    <img v-if="post.thumbnail" :src="post.thumbnail" class="w-16 h-16 rounded-lg object-cover bg-black" loading="lazy">
                    <div class="overflow-hidden">
                        <h2 class="text-white text-xl font-bold truncate">{{ post.title }}</h2>
                        <span class="text-blue-500 font-bold text-xs uppercase tracking-tighter">@{{ post.author }}</span>
                    </div>
                </div>
                <div class="text-blue-500 text-xs font-bold border border-blue-500/30 px-4 py-2 rounded-lg group-hover:bg-blue-500">View</div>
            </div>
        </div>

        <div v-if="isModalOpen" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 modal-blur" @click="closeModal">
            <div class="modal-content w-full max-w-4xl max-h-[90vh] flex flex-col shadow-2xl" @click.stop>
                <div class="p-6 border-b border-gray-800 flex justify-between items-center bg-[#0f1216]">
                    <h3 class="text-white font-black text-xl">{{ activePost.title }}</h3>
                    <button @click="closeModal" class="text-gray-500 hover:text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>
                
                <div class="p-6 overflow-y-auto custom-scrollbar">
                    <div class="grid md:grid-cols-2 gap-4 mb-6">
                        <div v-if="activePost.message" class="bg-white/5 p-4 rounded-xl border border-white/10 text-sm italic">"{{ activePost.message }}"</div>
                        <div v-if="activePost.videoUrl" class="video-container"><iframe :src="getEmbedUrl(activePost.videoUrl)" allowfullscreen></iframe></div>
                    </div>

                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-2 ml-1">JSON Content Preview</p>
                    <div class="code-wrapper">
                        <pre><code class="language-json">{{ displayedCode }}</code></pre>
                        
                        <div v-if="!showFullCode && isLongCode" class="absolute bottom-0 left-0 right-0 h-32 bg-gradient-to-t from-[#050608] to-transparent flex items-end justify-center pb-4">
                            <button @click="revealCode" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold text-xs uppercase tracking-widest hover:bg-blue-500 transition-all shadow-xl">Show Full Code (50+ lines)</button>
                        </div>
                    </div>
                </div>

                <div class="p-6 bg-[#161a1f] border-t border-gray-800 flex flex-wrap gap-3 justify-between items-center">
                    <span class="text-xs font-mono text-gray-500">{{ activeFileName }} ({{ activeFileSize }})</span>
                    <div class="flex gap-2">
                        <button @click="copyMacroLink" class="bg-white/5 text-white px-5 py-3 rounded-lg font-bold text-xs uppercase border border-white/10 flex items-center gap-2 min-w-[120px] justify-center">
                            <span :class="showCopied ? 'text-green-400' : ''">{{ showCopied ? 'Copied!' : 'Copy Link' }}</span>
                        </button>
                        <a :href="activePost.fileUrl" download class="bg-blue-600 text-white px-8 py-3 rounded-lg font-bold text-xs uppercase shadow-lg shadow-blue-600/20">Download</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                const posts = ref([]);
                const isLoading = ref(true);
                const searchQuery = ref('');
                const searchType = ref('title');
                const isModalOpen = ref(false);
                const activePost = ref({});
                const activeJsonContent = ref('');
                const activeFileName = ref('');
                const activeFileSize = ref('0 KB');
                const showCopied = ref(false);
                const showFullCode = ref(false);

                // Computed logic to handle 50-line limit
                const isLongCode = computed(() => {
                    return activeJsonContent.value.split('\n').length > 50;
                });

                const displayedCode = computed(() => {
                    if (showFullCode.value || !isLongCode.value) return activeJsonContent.value;
                    return activeJsonContent.value.split('\n').slice(0, 50).join('\n') + '\n\n... (Rest of code hidden for performance)';
                });

                const openModal = async (post) => {
                    activePost.value = post;
                    activeFileName.value = post.fileUrl ? post.fileUrl.split('/').pop() : 'macro.json';
                    showFullCode.value = false; 
                    isModalOpen.value = true;
                    document.body.style.overflow = 'hidden';

                    try {
                        const res = await fetch(post.fileUrl);
                        const data = await res.json();
                        activeJsonContent.value = JSON.stringify(data, null, 4);
                        const size = res.headers.get("content-length");
                        activeFileSize.value = size ? (size / 1024).toFixed(1) + " KB" : "Unknown";
                        
                        // Highlight the first 50 lines immediately
                        nextTick(() => { setTimeout(() => { Prism.highlightAll(); }, 50); });
                    } catch (e) { activeJsonContent.value = "// Error loading file."; }
                };

                const revealCode = () => {
                    showFullCode.value = true;
                    nextTick(() => { Prism.highlightAll(); });
                };

                const copyMacroLink = () => {
                    const cleanUrl = window.location.origin + window.location.pathname;
                    const shareUrl = `${cleanUrl}?macro=${encodeURIComponent(activePost.value.title)}`;
                    navigator.clipboard.writeText(shareUrl).then(() => {
                        showCopied.value = true;
                        setTimeout(() => { showCopied.value = false; }, 2000);
                    });
                };

                const closeModal = () => { isModalOpen.value = false; document.body.style.overflow = ''; };
                const getEmbedUrl = (url) => {
                    const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=|shorts\/)([^#&?]*).*/;
                    const match = url.match(regExp);
                    return (match && match[2].length === 11) ? `https://www.youtube.com/embed/${match[2]}` : url;
                };

                onMounted(async () => {
                    try {
                        const res = await fetch('//seralyth-macros.online/posts.json?v=' + Date.now());
                        posts.value = await res.json();
                        
                        const urlParams = new URLSearchParams(window.location.search);
                        const macroParam = urlParams.get('macro');
                        if (macroParam) {
                            const found = posts.value.find(p => p.title.toLowerCase() === macroParam.toLowerCase());
                            if (found) openModal(found);
                        }
                    } catch (e) {
                        try {
                            const retry = await fetch('posts.json');
                            posts.value = await retry.json();
                        } catch(err) {}
                    } finally { isLoading.value = false; }
                });

                const filteredPosts = computed(() => {
                    const q = searchQuery.value.toLowerCase().trim();
                    if (!q) return posts.value;
                    return posts.value.filter(p => searchType.value === 'title' ? p.title?.toLowerCase().includes(q) : p.author?.toLowerCase().includes(q));
                });

                return { 
                    posts, isLoading, searchQuery, searchType, filteredPosts, isModalOpen, activePost, 
                    activeJsonContent, activeFileName, activeFileSize, openModal, closeModal, getEmbedUrl, 
                    copyMacroLink, showCopied, showFullCode, revealCode, displayedCode, isLongCode 
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
